<!-- パスとファイル名: wiwa/templates/html/partials/header.html -->
    <header class="site-header">
        <h1 class="site-header__title"><a href="/" class="site-header__link"><img src="/static/themes/default/img/wiwa_logo.svg" alt="WiWA No magic. Just code.()"></a></h1>

        {% if current_user %}
            <p class="site-header__login-status">ログイン中：{{ current_user.display_name or current_user.username }}</p>
        {% endif %}
        <nav class="global-nav">
            <ul class="global-nav__list">
                <li class="global-nav__item"><a href="/post" class="global-nav__link">Post</a></li>
                {% if current_user %}
                <li class="global-nav__item"><a href="/admin" class="global-nav__link">Admin</a></li>
                <li class="global-nav__item"><a href="/auth/logout" class="global-nav__link">Logout</a></li>
                {% else %}
                <li class="global-nav__item"><a href="/auth/login" class="global-nav__link">Login</a></li>
                {% endif %}
            </ul>
        </nav>
    </header>
