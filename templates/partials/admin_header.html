<!-- Path and filename: templates/html/partials/admin_header.html -->
    <header class="site-header">
        <h1 class="site-header__title"><a href="/" class="site-header__link">{{ site_name }}</a></h1>
        <nav class="global-nav">
            <ul class="global-nav__list">
                <li class="global-nav__item"><a href="/post" class="link global-nav__link">POST</a></li>
                {% if current_user %}
                <li class="global-nav__item"><a href="/admin" class="link global-nav__link">ADMIN</a></li>
                <li class="global-nav__item"><a href="/auth/logout" class="link global-nav__link">LOGOUT</a></li>
                {% else %}
                <li class="global-nav__item"><a href="/auth/login" class="link global-nav__link">LOGIN</a></li>
                {% endif %}
            </ul>
        </nav>
        <nav class="admin-nav">
            <ul class="admin-nav__list">
                <li class="admin-nav__item"><a href="/admin" class="link admin-nav__link">ADMIN</a></li>
                <li class="admin-nav__item"><a href="/admin/post/list" class="link admin-nav__link">POST一覧</a></li>
                <li class="admin-nav__item"><a href="/admin/page/list" class="link admin-nav__link">固定ページ一覧</a></li>
                <li class="admin-nav__item"><a href="/admin/users/list" class="link admin-nav__link">ユーザー一覧</a></li>
            </ul>
        </nav>
    </header>
